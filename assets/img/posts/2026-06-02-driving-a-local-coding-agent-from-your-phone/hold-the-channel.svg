<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#1c1330"/>
  <text x="600" y="58" text-anchor="middle" font-size="34" font-weight="700" fill="#ffffff">Hold the channel, hold the machine</text>

  <!-- ============ LEFT: hacker with phone ============ -->
  <g>
    <!-- hood -->
    <path d="M170 320 q0 -150 130 -150 q130 0 130 150 z" fill="#11203a" stroke="#0a1526" stroke-width="3"/>
    <!-- face shadow -->
    <ellipse cx="300" cy="232" rx="60" ry="66" fill="#06101f"/>
    <!-- glowing eyes -->
    <circle cx="280" cy="226" r="7" fill="#d64545"/><circle cx="320" cy="226" r="7" fill="#d64545"/>
    <!-- smirk -->
    <path d="M282 256 q18 12 36 0" stroke="#d64545" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- arm + phone -->
    <path d="M360 330 q70 4 110 40" stroke="#11203a" stroke-width="16" fill="none" stroke-linecap="round"/>
    <rect x="452" y="350" width="50" height="86" rx="9" fill="#0a1526" stroke="#2bb3a3" stroke-width="2"/>
    <rect x="460" y="360" width="34" height="58" rx="3" fill="#06101f"/>
    <!-- skull on screen -->
    <circle cx="477" cy="382" r="11" fill="#2bb3a3"/>
    <circle cx="473" cy="380" r="2.4" fill="#06101f"/><circle cx="481" cy="380" r="2.4" fill="#06101f"/>
    <rect x="474" y="386" width="6" height="6" fill="#06101f"/>
    <text x="300" y="372" text-anchor="middle" font-size="18" font-weight="700" fill="#cbd5e1">attacker</text>
  </g>

  <!-- ============ MIDDLE: the channel + broken lock ============ -->
  <g>
    <path d="M512 392 q70 -30 150 -10" stroke="#2bb3a3" stroke-width="4" stroke-dasharray="8 8" fill="none"/>
    <path d="M656 378 l18 4 l-14 12 z" fill="#2bb3a3"/>
    <text x="585" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#2bb3a3">your account</text>
    <!-- broken padlock -->
    <g transform="translate(566,392)">
      <rect x="0" y="14" width="44" height="34" rx="6" fill="#f2a900"/>
      <path d="M8 14 v-8 a14 14 0 0 1 28 0" fill="none" stroke="#f2a900" stroke-width="6"/>
      <path d="M30 6 l16 -10" stroke="#d64545" stroke-width="5" stroke-linecap="round"/>
      <line x1="22" y1="26" x2="22" y2="40" stroke="#1c1330" stroke-width="4"/>
    </g>
  </g>

  <!-- ============ RIGHT: your laptop + treasure ============ -->
  <g>
    <!-- laptop -->
    <rect x="720" y="250" width="150" height="92" rx="8" fill="#0b1320" stroke="#2bb3a3" stroke-width="3"/>
    <rect x="700" y="342" width="190" height="14" rx="5" fill="#16243d"/>
    <text x="795" y="238" text-anchor="middle" font-size="16" font-weight="700" fill="#cbd5e1">your machine</text>

    <!-- treasure chest -->
    <g transform="translate(900,330)">
      <rect x="0" y="40" width="170" height="96" rx="10" fill="#8a5a2b" stroke="#3d2912" stroke-width="3"/>
      <path d="M0 56 q85 -56 170 0 l0 -8 q-85 -52 -170 0 z" fill="#a06a33" stroke="#3d2912" stroke-width="3"/>
      <rect x="76" y="58" width="18" height="26" rx="3" fill="#f2a900" stroke="#3d2912" stroke-width="2"/>
      <!-- spilling coins -->
      <circle cx="30" cy="34" r="13" fill="#f2c84b" stroke="#3d2912" stroke-width="2"/>
      <circle cx="62" cy="24" r="13" fill="#f2c84b" stroke="#3d2912" stroke-width="2"/>
      <circle cx="96" cy="22" r="13" fill="#f2c84b" stroke="#3d2912" stroke-width="2"/>
      <circle cx="132" cy="30" r="13" fill="#f2c84b" stroke="#3d2912" stroke-width="2"/>
    </g>
    <!-- loot tags -->
    <g font-size="15" font-weight="700" fill="#1c1330">
      <rect x="905" y="150" width="92" height="28" rx="6" fill="#e9eef5"/><text x="951" y="169" text-anchor="middle">~/.ssh</text>
      <rect x="1006" y="186" width="118" height="28" rx="6" fill="#e9eef5"/><text x="1065" y="205" text-anchor="middle">tokens / creds</text>
      <rect x="930" y="222" width="104" height="28" rx="6" fill="#e9eef5"/><text x="982" y="241" text-anchor="middle">your repo</text>
    </g>
    <!-- pickaxe -->
    <g transform="translate(1058,300) rotate(25)">
      <rect x="0" y="0" width="8" height="70" rx="3" fill="#6b4a22"/>
      <path d="M-24 4 q28 -18 56 0 q-28 8 -56 0 z" fill="#9aa7b5" stroke="#3d2912" stroke-width="2"/>
    </g>
  </g>

  <!-- caption -->
  <rect x="150" y="540" width="900" height="50" rx="10" fill="#2a1d44"/>
  <text x="600" y="572" text-anchor="middle" font-size="20" font-weight="600" fill="#ffd9b3">Approve from the same phone you send from — the gate is theirs too.</text>
</svg>
