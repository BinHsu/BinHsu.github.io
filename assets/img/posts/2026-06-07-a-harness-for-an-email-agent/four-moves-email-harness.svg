<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="8" fill="#0969da"/>

  <text x="60" y="72" fill="#1f2328" font-size="46" font-weight="800">Harnessing an email agent</text>
  <text x="60" y="110" fill="#424a53" font-size="23" font-weight="500">Four moves to make a <tspan fill="#bc4c00" font-weight="700">hijacked</tspan> agent harmless</text>

  <!-- header row -->
  <text x="78"  y="172" fill="#57606a" font-size="15" font-weight="700" letter-spacing="1.5">#</text>
  <text x="150" y="172" fill="#57606a" font-size="15" font-weight="700" letter-spacing="1.5">THE MOVE</text>
  <text x="710" y="172" fill="#57606a" font-size="15" font-weight="700" letter-spacing="1.5">WHY IT MATTERS</text>
  <line x1="60" y1="186" x2="1140" y2="186" stroke="#1f2328" stroke-width="2"/>

  <!-- rows: number centers 230, 320, 410, 500 -->
  <g>
    <circle cx="86" cy="230" r="18" fill="#0969da"/><text x="86" y="237" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">1</text>
    <text x="150" y="226" fill="#1f2328" font-size="21" font-weight="700">Tier by blast radius</text>
    <text x="150" y="252" fill="#57606a" font-size="16.5" font-weight="500">read &#183; send &#183; delete are not one capability</text>
    <text x="710" y="238" fill="#1f2328" font-size="18" font-weight="600">read is the injection entry point</text>
  </g>
  <line x1="60" y1="276" x2="1140" y2="276" stroke="#d0d7de" stroke-width="1.5"/>
  <g>
    <circle cx="86" cy="320" r="18" fill="#0969da"/><text x="86" y="327" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">2</text>
    <text x="150" y="316" fill="#1f2328" font-size="21" font-weight="700">Narrow tools + a human gate</text>
    <text x="150" y="342" fill="#57606a" font-size="16.5" font-weight="500">split the master tool; gate send &amp; delete</text>
    <text x="710" y="328" fill="#1f2328" font-size="18" font-weight="600">caps what it can reach</text>
  </g>
  <line x1="60" y1="366" x2="1140" y2="366" stroke="#d0d7de" stroke-width="1.5"/>
  <g>
    <circle cx="86" cy="410" r="18" fill="#0969da"/><text x="86" y="417" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">3</text>
    <text x="150" y="406" fill="#1f2328" font-size="21" font-weight="700">Scope the sender (IAM)</text>
    <text x="150" y="432" fill="#57606a" font-size="16.5" font-weight="500">send-as a noreply bot, never the CEO</text>
    <text x="710" y="418" fill="#1f2328" font-size="18" font-weight="600">caps the damage it does</text>
  </g>
  <line x1="60" y1="456" x2="1140" y2="456" stroke="#d0d7de" stroke-width="1.5"/>
  <g>
    <circle cx="86" cy="500" r="18" fill="#1a7f37"/><text x="86" y="507" text-anchor="middle" fill="#fff" font-size="19" font-weight="800">4</text>
    <text x="150" y="496" fill="#1f2328" font-size="21" font-weight="700">Log every call + attribution</text>
    <text x="150" y="522" fill="#57606a" font-size="16.5" font-weight="500">who/what did it &#8212; agent vs human</text>
    <text x="710" y="508" fill="#1f2328" font-size="18" font-weight="600">makes it traceable</text>
  </g>
  <line x1="60" y1="546" x2="1140" y2="546" stroke="#1f2328" stroke-width="2"/>

  <text x="60" y="588" fill="#57606a" font-size="17" font-weight="500"><tspan fill="#1f2328" font-weight="700">Prompt is advice. The mechanism is the rule.</tspan>  &#183;  built on Wisely Chen&#8217;s harness framing  &#183;  binhsu.github.io</text>
</svg>
